<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accessible NVDA Demo</title>
</head>
<body>
    <header>
        <h1>Welcome to Our Accessible Site</h1>
        <nav>
            <ul>
                <li><a href="#news">News</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="news">
            <h2>Latest News</h2>
            <p>Our new product launches next week. Stay tuned for updates.</p>
        </section>

        <section>
            <h2>Subscribe to Our Newsletter</h2>
            <form>
                <label for="email">Email address:</label>
                <input type="email" id="email" name="email" required>
                <button type="submit">Subscribe</button>
            </form>
        </section>

        <section>
            <h2>Our Logo</h2>
            <img src="logo.png" alt="Company logo featuring a stylized geometric design in blue and white, representing innovation and professionalism in web accessibility services">
        </section>

        <section>
            <h2>Product Table</h2>
            <table border="1">
                <caption>Product Prices</caption>
                <thead>
                    <tr>
                        <th scope="col">Product</th>
                        <th scope="col">Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Widget A</td>
                        <td>$10</td>
                    </tr>
                    <tr>
                        <td>Widget B</td>
                        <td>$15</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Accessible Web Co.</p>
    </footer>
</body>
</html>
